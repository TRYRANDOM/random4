<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AMITH S</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #e8f5e9, #ffffff);
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 8%;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid #1976d2;
    }

    header h1 {
      font-weight: 600;
      letter-spacing: 1px;
      color: #2e7d32;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #333;
      font-weight: 500;
      position: relative;
    }

    nav a::after {
      content: "";
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0%;
      height: 2px;
      background: #1976d2;
      transition: 0.3s;
    }

    nav a:hover::after {
      width: 100%;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .hero {
      max-width: 900px;
      text-align: center;
    }

    .hero h2 {
      font-size: 2.8rem;
      margin-bottom: 15px;
      line-height: 1.2;
    }

    .hero h2 span {
      color: #2e7d32;
    }

    .hero p {
      font-size: 1.1rem;
      color: #555;
      max-width: 600px;
      margin: 0 auto 30px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 500;
      text-decoration: none;
      transition: 0.25s ease;
      border: 2px solid #1976d2;
      box-shadow: 0 4px 12px rgba(25, 118, 210, 0.15);
    }

    .btn-primary {
      background: #c62828;
      color: white;
    }

    .btn-primary:hover {
      background: #b71c1c;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      color: #1976d2;
    }

    .btn-secondary:hover {
      background: #1976d2;
      color: white;
      transform: translateY(-2px);
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9rem;
      color: #666;
      border-top: 1px solid #ddd;
    }

    @media (max-width: 600px) {
      .hero h2 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>AMITH S</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Projects</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h2>Building clean and <span>efficient</span> solutions</h2>
      <p>
        I focus on creating practical, well-structured projects and continuously improving my skills in development.
      </p>

      <div class="buttons">
        <a href="https://github.com/yourusername" target="_blank" class="btn btn-primary">
          GitHub Profile
        </a>

        <a href="#" class="btn btn-secondary">
          View Projects
        </a>
      </div>
    </section>
  </main>

  <footer>
    © 2026 AMITH S
  </footer>

</body>
</html>
